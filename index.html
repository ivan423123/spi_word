<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SPI難語帖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Yuji+Syuku&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#eae7dd;
    --paper-deep:#dfdbcc;
    --card:#fbfaf5;
    --ink:#262320;
    --ink-soft:#6e6858;
    --ink-faint:#9a9384;
    --line:#cdc6b2;
    --line-soft:#ddd8c9;
    --indigo:#22405f;
    --indigo-deep:#152a40;
    --indigo-soft:#4d6c89;
    --indigo-bg:#e7ecf0;
    --shu:#ad3d27;
    --shu-deep:#86301e;
    --shu-bg:#f6e6e0;
    --brass:#9c7d3f;
    --brass-bg:#f1e9d6;
    --purple:#6c5a82;
    --purple-bg:#ece6f1;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      repeating-linear-gradient(transparent 0, transparent 27px, rgba(160,150,120,0.10) 28px),
      linear-gradient(180deg, var(--paper) 0%, var(--paper-deep) 100%);
    font-family:'Zen Kaku Gothic New', sans-serif;
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:620px;margin:0 auto;padding:0 0 10px;}

  /* ---------- header ---------- */
  .header{padding:30px 22px 0;text-align:center;}
  .eyebrow{
    font-family:'Yuji Syuku', serif;
    color:var(--shu);
    font-size:13px;
    letter-spacing:.12em;
    display:inline-block;
    border-bottom:1px solid var(--shu);
    padding-bottom:3px;
  }
  .header h1{
    font-family:'Shippori Mincho', serif;
    font-weight:800;
    font-size:30px;
    margin:10px 0 4px;
    letter-spacing:.02em;
  }
  .header .sub{font-size:12px;color:var(--ink-soft);margin-bottom:18px;}

  .stats{
    display:flex;justify-content:center;margin:0 18px;
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    background:rgba(255,253,247,0.5);
  }
  .stat{flex:1;max-width:160px;text-align:center;padding:11px 4px;border-right:1px solid var(--line);}
  .stat:last-child{border-right:none;}
  .stat .num{font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:700;color:var(--indigo);}
  .stat .label{font-size:10px;color:var(--ink-soft);letter-spacing:.04em;margin-top:2px;}
  .progress-rail{height:5px;background:var(--paper-deep);margin:0 18px;border-radius:0 0 4px 4px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--indigo-soft),var(--indigo));transition:width .5s ease;}

  /* ---------- tabs ---------- */
  .tabs{display:flex;gap:5px;padding:18px 18px 0;justify-content:center;}
  .tab{
    font-size:13px;font-weight:700;padding:10px 16px 9px;
    border-radius:9px 9px 0 0;background:var(--paper-deep);color:var(--ink-soft);
    cursor:pointer;border:1px solid var(--line);border-bottom:none;
    position:relative;top:1px;transition:background .15s,color .15s;
    user-select:none;
  }
  .tab.active{background:var(--card);color:var(--ink);box-shadow:0 -3px 0 var(--indigo) inset;}
  .tab:hover:not(.active){color:var(--ink);}

  .panel{
    background:var(--card);border:1px solid var(--line);border-radius:0 10px 10px 10px;
    margin:0 18px 26px;padding:24px 18px 28px;
    box-shadow:0 3px 16px rgba(40,30,10,.07);
    min-height:340px;
  }

  /* ---------- flashcard ---------- */
  .card-stage{display:flex;flex-direction:column;align-items:center;}
  .session-progress{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink-faint);margin-bottom:14px;letter-spacing:.02em;}

  .flashcard{width:100%;max-width:360px;height:230px;position:relative;perspective:1300px;margin:0 auto;}
  .flashcard-inner{width:100%;height:100%;position:relative;transition:transform .5s cubic-bezier(.4,.15,.2,1);transform-style:preserve-3d;cursor:pointer;}
  .flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;
    border:1px solid var(--line);background:#fffdf7;
    box-shadow:0 4px 18px rgba(40,30,10,.10);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .face.back{transform:rotateY(180deg);}
  .tab-strip{
    position:absolute;top:0;left:20px;padding:5px 13px 5px;border-radius:0 0 7px 7px;
    font-family:'Yuji Syuku', serif;font-size:12px;color:#fff;letter-spacing:.06em;z-index:2;
  }
  .tab-strip.word{background:var(--indigo);}
  .tab-strip.phrase{background:var(--brass);}
  .tab-strip.relation{background:var(--purple);}
  .hole{position:absolute;top:13px;right:15px;width:11px;height:11px;border-radius:50%;background:var(--paper);box-shadow:inset 0 1px 3px rgba(0,0,0,.3);}

  .face .content{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:38px 22px 6px;}
  .face.front .term{font-family:'Shippori Mincho', serif;font-weight:700;font-size:29px;line-height:1.45;color:var(--ink);}
  .face.back .term-small{font-family:'Shippori Mincho', serif;font-size:13px;color:var(--ink-faint);position:absolute;top:36px;left:21px;}
  .face.back .meaning{font-family:'Zen Kaku Gothic New', sans-serif;font-size:16px;line-height:1.75;color:var(--ink);padding-top:10px;}
  .hint{text-align:center;font-size:10.5px;color:var(--ink-faint);padding-bottom:11px;letter-spacing:.02em;}

  .stamp{
    position:absolute;width:96px;height:96px;border:5px solid var(--shu);border-radius:50%;
    color:var(--shu);font-family:'Yuji Syuku', serif;font-size:34px;display:flex;align-items:center;justify-content:center;
    opacity:0;transform:rotate(-16deg) scale(2.4);top:50%;left:50%;margin:-48px 0 0 -48px;
    pointer-events:none;mix-blend-mode:multiply;z-index:3;
  }
  .stamp.show{animation:stampDown .6s cubic-bezier(.22,1.6,.4,1) forwards;}
  @keyframes stampDown{
    0%{opacity:0;transform:rotate(-16deg) scale(2.6);}
    55%{opacity:.92;transform:rotate(-11deg) scale(.9);}
    100%{opacity:.85;transform:rotate(-11deg) scale(1);}
  }

  .dots{display:flex;gap:4px;justify-content:center;margin-top:14px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line);}
  .dot.filled{background:var(--indigo);}
  .dot.mastered-dot{background:var(--shu);}

  .actions{display:flex;gap:11px;width:100%;max-width:360px;margin:18px auto 0;opacity:0;transform:translateY(6px);transition:opacity .25s, transform .25s;pointer-events:none;}
  .actions.show{opacity:1;transform:translateY(0);pointer-events:auto;}
  .btn{flex:1;font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:14.5px;padding:13px 8px;border-radius:9px;border:none;cursor:pointer;transition:transform .12s;}
  .btn:active{transform:scale(.96);}
  .btn.again{background:#fff;color:var(--shu);border:1.5px solid var(--shu);}
  .btn.again:hover{background:var(--shu-bg);}
  .btn.know{background:var(--indigo);color:#fff;}
  .btn.know:hover{background:var(--indigo-deep);}
  .flip-tip{font-size:11.5px;color:var(--ink-faint);text-align:center;margin-top:13px;}

  /* ---------- quiz ---------- */
  .quiz-head{text-align:center;margin-bottom:4px;}
  .quiz-prompt{font-size:11.5px;color:var(--ink-soft);letter-spacing:.03em;}
  .quiz-term{font-family:'Shippori Mincho', serif;font-weight:700;font-size:28px;padding:10px 0 22px;text-align:center;}
  .choices{display:flex;flex-direction:column;gap:10px;max-width:480px;margin:0 auto;}
  .choice{
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;text-align:left;
    padding:13px 16px;border-radius:9px;border:1.5px solid var(--line);background:#fff;
    cursor:pointer;color:var(--ink);line-height:1.55;transition:border-color .15s, background .15s;
  }
  .choice:hover:not(.disabled){border-color:var(--indigo-soft);}
  .choice.correct{border-color:var(--indigo);background:var(--indigo-bg);}
  .choice.wrong{border-color:var(--shu);background:var(--shu-bg);animation:shake .35s;}
  .choice.disabled{cursor:default;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
  .quiz-footer{display:flex;justify-content:space-between;align-items:center;margin-top:20px;max-width:480px;margin-left:auto;margin-right:auto;}
  .quiz-score{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);}
  .btn-next{background:var(--indigo);color:#fff;font-weight:700;font-size:13.5px;padding:10px 20px;border-radius:9px;border:none;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .2s;}
  .btn-next.show{opacity:1;pointer-events:auto;}

  /* ---------- list ---------- */
  .list-controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .search{flex:1 1 100%;font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;padding:10px 13px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);}
  .search:focus{outline:2px solid var(--indigo-soft);outline-offset:-1px;}
  .chip-row{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{font-size:11.5px;padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--ink-soft);user-select:none;}
  .chip.active{background:var(--indigo);color:#fff;border-color:var(--indigo);}
  .list-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-faint);margin:2px 2px 10px;}
  .list-rows{display:flex;flex-direction:column;}
  .row{display:flex;flex-direction:column;gap:3px;padding:12px 4px;border-bottom:1px solid var(--line-soft);}
  .row-top{display:flex;align-items:baseline;gap:8px;}
  .row .mark{width:15px;flex-shrink:0;text-align:center;font-size:12px;color:var(--shu);}
  .row .term{font-family:'Shippori Mincho', serif;font-weight:700;font-size:15.5px;color:var(--ink);line-height:1.4;}
  .row .badge{font-size:9.5px;padding:2px 7px;border-radius:999px;flex-shrink:0;margin-left:auto;white-space:nowrap;}
  .row .meaning{font-size:12.5px;color:var(--ink-soft);line-height:1.6;padding-left:23px;}
  .badge.word{background:var(--indigo-bg);color:var(--indigo);}
  .badge.phrase{background:var(--brass-bg);color:var(--brass);}
  .badge.relation{background:var(--purple-bg);color:var(--purple);}
  .empty-msg{text-align:center;color:var(--ink-faint);font-size:13px;padding:30px 0;}

  .footer-bar{text-align:center;padding:4px 0 32px;font-size:11.5px;color:var(--ink-faint);}
  .footer-bar a{color:var(--ink-soft);text-decoration:underline;cursor:pointer;}

  .loading{text-align:center;padding:60px 0;color:var(--ink-soft);font-size:13px;}

  @media (max-width:420px){
    .header h1{font-size:25px;}
    .flashcard{height:215px;}
    .face.front .term{font-size:24px;}
    .row .term{font-size:14.5px;}
  }
</style>
</head>
<body>

<script>
const VOCAB = [{"term": "粗略", "meaning": "ものごとの扱い方がぞんざいなこと", "category": "word", "id": "v1"}, {"term": "逓減", "meaning": "次第に減ること", "category": "word", "id": "v2"}, {"term": "路頭に迷う", "meaning": "生活に困ること", "category": "word", "id": "v3"}, {"term": "進取", "meaning": "進んで新しいことをすること", "category": "word", "id": "v4"}, {"term": "よんどころない", "meaning": "そうするよりほかにないこと", "category": "word", "id": "v5"}, {"term": "潜行", "meaning": "ひそかに活動すること", "category": "word", "id": "v6"}, {"term": "一顧", "meaning": "ちょっと振り返ってみること", "category": "word", "id": "v7"}, {"term": "扇動", "meaning": "人をあおりたて、行動を起こすように刺激すること", "category": "word", "id": "v8"}, {"term": "亜流", "meaning": "一流の真似をして劣っているもの", "category": "word", "id": "v9"}, {"term": "超然", "meaning": "世俗的な物事にこだわらないこと", "category": "word", "id": "v10"}, {"term": "在野", "meaning": "公職につかず、民間にいること", "category": "word", "id": "v11"}, {"term": "桎梏", "meaning": "手かせ足かせ。自由を厳しく束縛するもの", "category": "word", "id": "v12"}, {"term": "心酔", "meaning": "心から慕って関心を持つこと", "category": "word", "id": "v13"}, {"term": "卓見", "meaning": "優れた意見", "category": "word", "id": "v14"}, {"term": "謬見", "meaning": "間違った考え", "category": "word", "id": "v15"}, {"term": "大綱", "meaning": "話の根本", "category": "word", "id": "v16"}, {"term": "判然", "meaning": "はっきりしていること", "category": "word", "id": "v17"}, {"term": "確執", "meaning": "互いに反目し、仲が悪いこと", "category": "word", "id": "v18"}, {"term": "精通", "meaning": "知悉していること(詳しく知っていること)", "category": "word", "id": "v19"}, {"term": "常緑樹", "meaning": "落葉しない木", "category": "word", "id": "v20"}, {"term": "くさす", "meaning": "悪く言うこと", "category": "word", "id": "v21"}, {"term": "浮沈", "meaning": "栄えるか衰えるか", "category": "word", "id": "v22"}, {"term": "拘泥", "meaning": "気にしてこだわること", "category": "word", "id": "v23"}, {"term": "悔悟", "meaning": "過ちを認めて後悔すること", "category": "word", "id": "v24"}, {"term": "耽溺", "meaning": "夢中になっておぼれること", "category": "word", "id": "v25"}, {"term": "悠然", "meaning": "ゆったりと落ち着いていること", "category": "word", "id": "v26"}, {"term": "増長", " function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function buildSession(){
  const weighted = VOCAB.map(v=>({ id:v.id, w: 6 - (progress[v.id]?.box || 1) }));
  weighted.forEach(item=>{ item.key = Math.pow(Math.random(), 1/item.w); });
  weighted.sort((a,b)=> b.key - a.key);
  return weighted.map(x=>x.id);
}

async function loadProgress(){
  let loaded = null;
  try{
    const res = localStorage.getItem('progress');
    loaded = res ? JSON.parse(res) : null;
  }catch(e){ loaded = null; }
  progress = loaded || {};
  VOCAB.forEach(v=>{ if(!progress[v.id]) progress[v.id] = { box:1, seen:0 }; });
}

async function saveProgress(){
  try{ localStorage.setItem('progress', JSON.stringify(progress)); }
  catch(e){ console.error('save failed', e); }
}

function counts(){
  let mastered=0, started=0;
  VOCAB.forEach(v=>{
    const p = progress[v.id];
    if(p.box>=3) mastered++;
    else if(p.seen>0) started++;
  });
  return { total: VOCAB.length, mastered, started, untouched: VOCAB.length - mastered - started };
}

function vocabById(id){ return VOCAB.find(v=>v.id===id); }

function currentFlashVocab(){
  if(flashIndex >= flashQueue.length){ flashQueue = buildSession(); flashIndex = 0; }
  return vocabById(flashQueue[flashIndex]);
}

function renderFlashContent(){
  const v = currentFlashVocab();
  const p = progress[v.id];
  document.getElementById('flashProgress').textContent = `${flashIndex+1} / ${flashQueue.length}`;
  document.getElementById('frontTerm').textContent = v.term;
  document.getElementById('backMeaning').textContent = v.meaning;
  document.getElementById('backTermSmall').textContent = v.term;
  document.getElementById('frontTab').textContent = CATEGORY_LABEL[v.category];
  document.getElementById('frontTab').className = 'tab-strip ' + v.category;
  document.getElementById('backTab').textContent = CATEGORY_LABEL[v.category];
  document.getElementById('backTab').className = 'tab-strip ' + v.category;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('flashActions').classList.remove('show');
  document.getElementById('stamp').classList.remove('show');
  renderDots('flashDots', p.box);
}

function renderDots(elId, box){
  let html = '';
  for(let i=1;i<=5;i++){
    html += `<span class="dot ${i<=box ? (box>=3?'mastered-dot':'filled') : ''}"></span>`;
  }
  document.getElementById(elId).innerHTML = html;
}

function toggleFlip(){
  flipped = !flipped;
  document.getElementById('flashcard').classList.toggle('flipped', flipped);
  document.getElementById('flashActions').classList.toggle('show', flipped);
}

function markCard(known){
  if(!flipped) return;
  const v = currentFlashVocab();
  const p = progress[v.id];
  const wasMastered = p.box >= 3;
  p.seen++;
  p.box = known ? Math.min(5, p.box + 1) : 1;
  saveProgress();
  renderStats();
  renderDots('flashDots', p.box);
  if(known && p.box >= 3 && !wasMastered){
    document.getElementById('stamp').classList.add('show');
    setTimeout(advanceFlash, 750);
  } else {
    setTimeout(advanceFlash, 180);
  }
}

function advanceFlash(){
  flipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('flashActions').classList.remove('show');
  document.getElementById('stamp').classList.remove('show');
  setTimeout(() => {
    flashIndex++;
    renderFlashContent();
  }, 250);
}

/* ---------------- quiz mode ---------------- */
function renderQuizPanel(){
  if(quizQueue.length === 0){ quizQueue = buildSession(); quizIndex = 0; }
  const panel = document.getElementById('panel');
  panel.innerHTML = `
    <div class="quiz-head">
      <div class="quiz-prompt">この言葉の意味として正しいものを選んでください</div>
      <div class="session-progress" id="quizProgress"></div>
    </div>
    <div class="quiz-term" id="quizTerm"></div>
    <div class="choices" id="quizChoices"></div>
    <div class="quiz-footer">
      <div class="quiz-score" id="quizScore"></div>
      <button class="btn-next" id="btnNext">次へ →</button>
    </div>
  `;
  document.getElementById('btnNext').addEventListener('click', ()=>{
    quizIndex++;
    if(quizIndex >= quizQueue.length){ quizQueue = buildSession(); quizIndex = 0; }
    renderQuizQuestion();
  });
  renderQuizQuestion();
}

function renderQuizQuestion(){
  quizAnswered = false;
  const id = quizQueue[quizIndex];
  const v = vocabById(id);
  document.getElementById('quizProgress').textContent = `${quizIndex+1} / ${quizQueue.length}`;
  document.getElementById('quizTerm').textContent = v.term;
  document.getElementById('quizScore').textContent = `正解 ${quizScore.correct} / ${quizScore.total}`;
  document.getElementById('btnNext').classList.remove('show');

  let pool = VOCAB.filter(x=> x.id !== v.id && x.category === v.category);
  if(pool.length < 3) pool = VOCAB.filter(x=> x.id !== v.id);
  shuffle(pool);
  const distractors = pool.slice(0,3).map(x=>x.meaning);
  const options = shuffle([v.meaning, ...distractors]);

  const choicesEl = document.getElementById('quizChoices');
  choicesEl.innerHTML = '';
  options.forEach(meaning=>{
    const btn = document.createElement('div');
    btn.className = 'choice';
    btn.textContent = meaning;
    btn.dataset.correct = (meaning === v.meaning) ? '1' : '0';
    btn.addEventListener('click', ()=> selectChoice(btn, v.id));
    choicesEl.appendChild(btn);
  });
}

function selectChoice(el, id){
  if(quizAnswered) return;
  quizAnswered = true;
  const isCorrect = el.dataset.correct === '1';
  const p = progress[id];
  p.seen++;
  quizScore.total++;
  if(isCorrect){
    p.box = Math.min(5, p.box + 1);
    quizScore.correct++;
    el.classList.add('correct');
  } else {
    p.box = 1;
    el.classList.add('wrong');
    document.querySelectorAll('#quizChoices .choice').forEach(c=>{
      if(c.dataset.correct === '1') c.classList.add('correct');
    });
  }
  document.querySelectorAll('#quizChoices .choice').forEach(c=> c.classList.add('disabled'));
  document.getElementById('quizScore').textContent = `正解 ${quizScore.correct} / ${quizScore.total}`;
  document.getElementById('btnNext').classList.add('show');
  saveProgress();
  renderStats();
}

/* ---------------- list mode ---------------- */
function renderListPanel(){
  const panel = document.getElementById('panel');
  panel.innerHTML = `
    <div class="list-controls">
      <input class="search" id="searchInput" type="text" placeholder="語句や意味で検索…" value="${listFilter.search}">
      <div class="chip-row" id="catChips">
        <div class="chip" data-cat="all">すべて</div>
        <div class="chip" data-cat="word">語彙</div>
        <div class="chip" data-cat="phrase">慣用句</div>
        <div class="chip" data-cat="relation">関連語</div>
      </div>
      <div class="chip-row" id="statusChips">
        <div class="chip" data-status="all">すべて</div>
        <div class="chip" data-status="todo">未習得</div>
        <div class="chip" data-status="done">習得済み</div>
      </div>
    </div>
    <div class="list-count" id="listCount"></div>
    <div class="list-rows" id="listRows"></div>
  `;
  document.getElementById('searchInput').addEventListener('input', (e)=>{
    listFilter.search = e.target.value;
    renderListRows();
  });
  document.querySelectorAll('#catChips .chip').forEach(c=>{
    c.addEventListener('click', ()=>{ listFilter.cat = c.dataset.cat; renderListPanel(); });
  });
  document.querySelectorAll('#statusChips .chip').forEach(c=>{
    c.addEventListener('click', ()=>{ listFilter.status = c.dataset.status; renderListPanel(); });
  });
  document.querySelectorAll('#catChips .chip').forEach(c=> c.classList.toggle('active', c.dataset.cat===listFilter.cat));
  document.querySelectorAll('#statusChips .chip').forEach(c=> c.classList.toggle('active', c.dataset.status===listFilter.status));
  renderListRows();
}

function renderListRows(){
  const q = listFilter.search.trim();
  const filtered = VOCAB.filter(v=>{
    if(listFilter.cat !== 'all' && v.category !== listFilter.cat) return false;
    const mastered = progress[v.id].box >= 3;
    if(listFilter.status === 'todo' && mastered) return false;
    if(listFilter.status === 'done' && !mastered) return false;
    if(q && !(v.term.includes(q) || v.meaning.includes(q))) return false;
    return true;
  });

  // 進捗（box）が大きい順、次に確認回数（seen）が多い順にソート
  filtered.sort((a, b) => {
    const pA = progress[a.id];
    const pB = progress[b.id];
    if (pB.box !== pA.box) return pB.box - pA.box;
    return pB.seen - pA.seen;
  });

  document.getElementById('listCount').textContent = `${filtered.length} 件`;
  const rowsEl = document.getElementById('listRows');
  if(filtered.length === 0){
    rowsEl.innerHTML = '<div class="empty-msg">条件に合う語句が見つかりません</div>';
    return;
  }
  rowsEl.innerHTML = filtered.map(v=>{
    const p = progress[v.id];
    const mastered = p.box >= 3;
    return `
      <div class="row">
        <div class="row-top">
          <div class="mark">${mastered ? '済' : ''}</div>
          <div class="term">${v.term}</div>
          <div class="badge ${v.category}">${CATEGORY_LABEL[v.category]}</div>
        </div>
        <div class="dots" style="justify-content: flex-start; margin: 4px 0 4px 23px; gap:3px;">
          ${[1,2,3,4,5].map(i => `
            <span class="dot ${i <= p.box ? (p.box >= 3 ? 'mastered-dot' : 'filled') : ''}" style="width:6px; height:6px;"></span>
          `).join('')}
        </div>
        <div class="meaning">${v.meaning}</div>
      </div>
    `;
  }).join('');
}

/* ---------------- reset ---------------- */
async function doResetProgress(){
  progress = {};
  VOCAB.forEach(v=> progress[v.id] = { box:1, seen:0 });
  await saveProgress();
  flashQueue = buildSession(); flashIndex = 0;
  quizQueue = buildSession(); quizIndex = 0;
  quizScore = { correct:0, total:0 };
  renderStats();
  renderPanel();
  renderFooter(false);
}

/* ---------------- init ---------------- */
(async function init(){
  await loadProgress();
  flashQueue = buildSession(); flashIndex = 0;
  quizQueue = buildSession(); quizIndex = 0;
  renderShell();
  renderPanel();
})();
</script>
